<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Service Receipt</title>
<style>
  :root{
    --teal:#1f9d8f; --teal-dark:#178074; --teal-soft:#e8f5f3;
    --bg:#f4f7f6; --card:#ffffff; --line:#e3e9e8;
    --text:#2b3a39; --muted:#7d8c8a; --ok:#1f9d8f; --err:#d9534f;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Segoe UI',Arial,sans-serif; background:var(--bg);
    color:var(--text); display:flex; justify-content:center; padding:28px 16px;
  }
  .card{
    background:var(--card); width:100%; max-width:560px; border-radius:18px;
    box-shadow:0 8px 30px rgba(31,157,143,.10); overflow:hidden;
  }
  .head{
    background:linear-gradient(135deg,var(--teal),var(--teal-dark));
    color:#fff; padding:28px 32px;
  }
  .head .logo{
    width:42px; height:42px; border-radius:12px; background:rgba(255,255,255,.18);
    display:flex; align-items:center; justify-content:center; font-size:20px; margin-bottom:14px;
  }
  .head h1{margin:0; font-size:21px; font-weight:600; letter-spacing:.2px;}
  .head p{margin:6px 0 0; font-size:13px; opacity:.92;}
  .body{padding:28px 32px;}
  .field{margin-bottom:20px;}
  label{display:block; font-weight:600; margin-bottom:7px; font-size:13.5px; color:var(--text);}
  .req{color:var(--err);}
  input{
    width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:11px;
    font-size:15px; background:#fbfdfc; color:var(--text); transition:.15s;
  }
  input:focus{outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(31,157,143,.14); background:#fff;}
  input[readonly]{background:#eef3f2; color:var(--muted); cursor:not-allowed;}
  .joinrow{display:flex;}
  .joinrow .pre{
    background:#eef3f2; border:1px solid var(--line); border-right:none;
    padding:12px 14px; border-radius:11px; white-space:nowrap; color:var(--muted);
    font-size:15px; width:100%; letter-spacing:.5px;
  }
  button{
    width:100%; padding:15px; background:var(--teal); color:#fff; border:none;
    border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; margin-top:8px;
    transition:.15s;
  }
  button:hover{background:var(--teal-dark);}
  button:disabled{opacity:.6; cursor:default;}
  .note{font-size:11.5px; color:var(--muted); margin-top:20px; text-align:center; line-height:1.5;}
  .msg{margin-top:18px; padding:13px 15px; border-radius:11px; font-weight:600; font-size:14px; display:none;}
  .msg.ok{background:var(--teal-soft); color:var(--ok); display:block;}
  .msg.err{background:#fbe9e8; color:var(--err); display:block;}
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="logo">&#9201;</div>
      <h1>Service Receipt</h1>
      <p>AKAI Distributors &mdash; submit a new service entry</p>
    </div>
    <div class="body">
      <div class="field">
        <label>SRF Number <span class="req">*</span></label>
        <input id="srf" placeholder="Enter SRF number" autocomplete="off">
      </div>

      <div class="field">
        <label>Date <span class="req">*</span></label>
        <input id="date" type="date">
      </div>

      <div class="field">
        <label>Dealer Name <span class="req">*</span></label>
        <input id="dealer" list="dealerList" placeholder="Start typing dealer name" autocomplete="off">
        <datalist id="dealerList"></datalist>
      </div>

      <div class="field">
        <label>Sales Executive <span class="req">*</span></label>
        <input id="sales" list="salesList" placeholder="Start typing name" autocomplete="off">
        <datalist id="salesList"></datalist>
      </div>

      <div class="field">
        <label>D.O.P <span class="req">*</span></label>
        <input id="dop" list="dopList" placeholder="Stock, PGD, or type your own" autocomplete="off">
        <datalist id="dopList">
          <option value="Stock"></option>
          <option value="PGD"></option>
        </datalist>
      </div>

      <div class="field">
        <label>Variant Number <span class="req">*</span></label>
        <input id="variant" placeholder="Enter variant number" autocomplete="off">
      </div>

      <div class="field">
        <label>Complain <span class="req">*</span></label>
        <input id="complain" list="complainList" placeholder="Start typing complain" autocomplete="off">
        <datalist id="complainList">
          <option value="STRAP BROKEN"></option><option value="STOP"></option>
          <option value="SPEAKER ISSUE"></option><option value="RUNNING SLOW"></option>
          <option value="NOTIFICATION ISSUE"></option><option value="M.G CHANGE"></option>
          <option value="LOCK PROBLEM"></option><option value="LIGHT ISSUE"></option>
          <option value="HANDS PROBLEM"></option><option value="DISPLAY PROBLEM"></option>
          <option value="DIGITAL PROBLEM"></option><option value="DAY DATE PROBLEM"></option>
          <option value="DAIL SPOT"></option><option value="CROWN ISSUE"></option>
          <option value="CHARGING ISSUE"></option><option value="CHAIN DISCOLOUR"></option>
          <option value="CASE/CHAIN DISCOLOUR"></option><option value="CASE STONE MISSING"></option>
          <option value="CASE DISCOLOUR"></option><option value="BEZEL MISSING/LOOSE"></option>
          <option value="BATTARY DRAINING VERY FAST"></option>
        </datalist>
      </div>

      <div class="field">
        <label>Job Offer <span class="req">*</span></label>
        <div class="joinrow">
          <span class="pre" id="jobPre"></span>
        </div>
      </div>

      <button id="submitBtn" onclick="submitForm()">Submit</button>
      <div class="msg" id="msg"></div>
      <div class="note">This content is securely sent to AKAI Distributors service system.</div>
    </div>
  </div>

<script>
  // ───── CONFIG: paste your Apps Script Web App URL below ─────
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyegqh7qxr8MF08nze2E4iTvt-fIIc4aWZRAAI4hP5XBPDTrfPeQAHnVQE5DuB3Xxj/exec";
  const JOB_PREFIX = "JOAE34526270";
  // ─────────────────────────────────────────────────────────────

  const DEALERS = ["A.C BANERJEE & SONS","AKAI DISTRIBUTORS","AKAI ELECTRONICS","ANANDA WATCH CO.","ASHALATA WATCH","BANIK WATCH","BASAK RADIO & WATCH","BERIWAL DISTRIBUTOR","BISHNU WATCH CO","BUNTY WATCH CO","CALCUTTA WATCH TRADING CO","CAPITAL WATCH CO. (DHP)","CHATTERJEE WATCH CO.","EASTERN WATCH CO.","FASHION SQUARE","GANESH WATCH CO","GHARI HOUSE","GHARI MAHAL ( BLG)","GHARI MAHAL (MLD)","GUPTA ELECTRONICS","GUPTA WATCH CO.","HIND WATCH CO.","HIND WATCH CO. (RAI)","JANATA WATCH CO.","JAY GURU TIME CO.","KOHINOOR WATCH MAKERS","LITON WATCH CO","M.B. WATCH ENTERPRISE","M/s B.ROY","M/S SONY TIMES","MANGALDEEP","MAPLE WATCH WORLD","MAYA WATCH CO","MAZUMDAR WATCH","MODERN WATCH CO","MUKUL WATCH CO","NEW GENEVA WATCH CO.","NEW RATAN WATCH CO.","NEW RUBY WATCH","NEW TIME AND SOUND","NORTH BENGAL WATCH & ELECTRICALS","ORIENT GLOBAL PVT LTD(RAI)","ORIENT GLOBAL PVT.LTD.(ALP)","ORIENT WATCH & RADIO CO","PANDIT SUDAMA MISHRA","PAUL BROTHER","PAUL WATCH CO","POPULAR WATCH CO.","PRANAB & BROTHERS","PRISTINE","PURANMAL RADHAKISHAN","RAHUL ENTERPRISE","RAJ KUMARI DEVI","RAJ WATCH CO (SLG)","RAJ WATCH CO.","REGENT WATCH CO.","ROYAL WATCH CO (SLG)","ROYAL'S COLLECTION","RUBY WATCH CO (D)","SAHA ELECTRONICS","SAHA WATCH CO.","SARKAR WATCH CENTRE","SARWAN WATCH CENTER","SIDARTH COMMUNICATION","SINGTAM WATCH HOUSE","SOUMIK ENTERPRISE","SRI KRISHNA WATCH CO.","STYLO","SWISS WATCH CO","THE MAPLE","TIME CENTRE","TIME HOUSE","TIME HOUSE (MATIGARA)","TIME HOUSE & OPTICALS","TIME KING","TIME MONARCH","UNION ENTERPRISE","WATCH AND OPTIC CENTRE"];
  const SALES = ["SAMARENDRA CHANDRA SARKA","AJAY SINGHA","SOMEN DAS","CHANDAN DAS"];

  document.getElementById('jobPre').textContent = JOB_PREFIX;
  (function(){
    var dl=document.getElementById('dealerList'); DEALERS.forEach(function(x){var o=document.createElement('option');o.value=x;dl.appendChild(o);});
    var sl=document.getElementById('salesList'); SALES.forEach(function(x){var o=document.createElement('option');o.value=x;sl.appendChild(o);});
    document.getElementById('date').value = new Date().toISOString().slice(0,10);
  })();

  function val(id){ return document.getElementById(id).value.trim(); }

  function submitForm(){
    var msg=document.getElementById('msg');
    var payload = {
      srf: val('srf'),
      date: val('date'),
      dealer: val('dealer'),
      sales: val('sales'),
      dop: val('dop'),
      variant: val('variant'),
      complain: val('complain'),
      joboffer: JOB_PREFIX
    };

    if(!payload.srf||!payload.date||!payload.dealer||!payload.sales||!payload.dop||!payload.variant||!payload.complain){
      msg.className='msg err'; msg.textContent='Please fill all required fields.'; return;
    }

    var btn=document.getElementById('submitBtn');
    btn.disabled=true; btn.textContent='Submitting...';
    msg.style.display='none';

    fetch(SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) })
      .then(function(r){ return r.json(); })
      .then(function(res){
        if(res.status==='ok'){ msg.className='msg ok'; msg.textContent='Submitted successfully. Thank you!'; resetForm(); }
        else { msg.className='msg err'; msg.textContent='Error: '+(res.message||'try again'); }
      }).catch(function(){
        msg.className='msg ok'; msg.textContent='Submitted. Thank you!'; resetForm();
      }).finally(function(){
        btn.disabled=false; btn.textContent='Submit';
      });
  }

  function resetForm(){
    ['srf','variant','dealer','sales','dop','complain'].forEach(function(id){document.getElementById(id).value='';});
    document.getElementById('date').value=new Date().toISOString().slice(0,10);
  }
</script>
</body>
</html>
